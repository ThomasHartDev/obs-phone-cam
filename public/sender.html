<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Phone Cam — Sender</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="sender">
    <!-- raw camera (hidden) is drawn, rotated, into the canvas we actually send -->
    <video id="raw" playsinline autoplay muted hidden></video>
    <canvas id="preview"></canvas>

    <div class="hud">
      <div id="status" class="status">Starting camera…</div>

      <!-- filter settings: hidden until "Adjust" is tapped -->
      <div id="panel" class="panel" hidden>
        <div class="presets" id="presets"></div>
        <div class="sliders">
          <label>Exposure<input type="range" data-p="exposure" min="-1" max="1" step="0.01" /></label>
          <label>Temp<input type="range" data-p="temp" min="-1" max="1" step="0.01" /></label>
          <label>Tint<input type="range" data-p="tint" min="-1" max="1" step="0.01" /></label>
          <label>Contrast<input type="range" data-p="contrast" min="0.7" max="1.4" step="0.01" /></label>
          <label>Saturation<input type="range" data-p="saturation" min="0" max="2" step="0.01" /></label>
          <label>Skin warmth<input type="range" data-p="skin" min="0" max="0.3" step="0.005" /></label>
          <label>Lens fix<input type="range" data-p="lens" min="-0.4" max="0.4" step="0.01" /></label>
          <label>Slim face<input type="range" data-p="slim" min="0" max="0.35" step="0.01" /></label>
          <label>Zoom<input type="range" data-p="zoom" min="1" max="2" step="0.01" /></label>
          <label>Soften<input type="range" data-p="soften" min="0" max="1" step="0.01" /></label>
          <label>Background blur<input type="range" data-p="blur" min="0" max="1" step="0.01" /></label>
        </div>
        <div class="toggles">
          <label><input id="mirror" type="checkbox" /> Mirror</label>
          <label><input id="calib" type="checkbox" /> Calibrate (raw | you)</label>
          <button id="reset" type="button">Reset</button>
        </div>
      </div>

      <div class="controls">
        <button id="adjust" type="button" aria-pressed="false">Adjust</button>
        <button id="ab" type="button" title="hold to compare raw">A/B</button>
        <button id="rotate" type="button">Rotate</button>
        <button id="flip" type="button">Flip camera</button>
        <select id="res" aria-label="Resolution">
          <option value="1280x720">720p</option>
          <option value="1920x1080" selected>1080p</option>
          <option value="3840x2160">4K</option>
        </select>
        <label class="mic"
          ><input id="mic" type="checkbox" checked /> Mic</label
        >
      </div>
    </div>

    <script type="module">
      import { Signal, RTC_CONFIG } from "/signal.js";
      import { CameraFilter, DEFAULT_PARAMS, PRESETS } from "/filters.js";

      const raw = document.getElementById("raw");
      const canvas = document.getElementById("preview");
      const filter = new CameraFilter(canvas);
      const statusEl = document.getElementById("status");
      const flipBtn = document.getElementById("flip");
      const rotateBtn = document.getElementById("rotate");
      const resSel = document.getElementById("res");
      const micBox = document.getElementById("mic");

      let facing = "environment"; // back camera by default — better for OBS scenes
      let rotationOffset = 0; // manual 90° correction if auto guesses the wrong way

      // Live filter params. Persisted so the phone remembers your look between
      // sessions. A/B "hold" temporarily renders the raw frame for comparison.
      const STORE = "obscam.params";
      let params = loadParams();
      let abHold = false;
      function loadParams() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORE) || "null");
          if (saved) return { ...DEFAULT_PARAMS, ...saved };
        } catch {}
        return { ...PRESETS["True to Life"] };
      }
      function saveParams() {
        try {
          localStorage.setItem(STORE, JSON.stringify(params));
        } catch {}
      }
      // what the shader actually renders this frame (A/B bypasses the grade)
      function activeParams() {
        if (!abHold) return params;
        return { ...DEFAULT_PARAMS, mirror: params.mirror, lens: 0, zoom: 1 };
      }

      let rawStream = null;
      let outStream = null; // the rotated canvas stream we send
      let drawing = false;
      let pc = null;
      let peerPresent = false;

      const setStatus = (t, cls = "") => {
        statusEl.textContent = t;
        statusEl.className = "status " + cls;
      };

      // iOS getUserMedia always hands out the landscape sensor frame and ignores a
      // portrait request. So we take that landscape frame and rotate it to match how
      // the phone is held: upright -> portrait, turned sideways -> landscape.
      function deviceIsPortrait() {
        if (screen.orientation && screen.orientation.type)
          return screen.orientation.type.startsWith("portrait");
        if (typeof window.orientation === "number")
          return window.orientation === 0 || window.orientation === 180;
        return window.innerHeight >= window.innerWidth;
      }
      function effectiveRotation() {
        const base = deviceIsPortrait() ? 90 : 0; // rotate the landscape sensor upright
        return (base + rotationOffset) % 360;
      }

      // Background blur needs a person mask. MediaPipe selfie segmentation runs
      // on-device; we load it lazily (only when blur is first turned on) so the
      // ~11MB wasm never costs anyone who doesn't use it. Fail-soft: if it can't
      // load, blur simply stays off and everything else works.
      let segmenter = null;
      let segLoading = false;
      let lastSegTs = 0;
      let smoothMask = null;
      async function ensureSegmenter() {
        if (segmenter || segLoading) return;
        segLoading = true;
        try {
          const vision = await import("/vendor/mediapipe/vision_bundle.mjs");
          const fileset = await vision.FilesetResolver.forVisionTasks(
            "/vendor/mediapipe/wasm",
          );
          segmenter = await vision.ImageSegmenter.createFromOptions(fileset, {
            baseOptions: {
              modelAssetPath: "/vendor/mediapipe/selfie_segmenter.tflite",
            },
            runningMode: "VIDEO",
            outputConfidenceMasks: true,
            outputCategoryMask: false,
          });
        } catch (e) {
          console.warn("segmenter init failed; background blur disabled", e);
          segmenter = null;
        } finally {
          segLoading = false;
        }
      }
      function updateMask(ap) {
        if (!ap.blur || ap.blur < 0.001) {
          filter.setMask(null);
          return;
        }
        ensureSegmenter();
        if (!segmenter) return; // still loading -> render sharp until ready
        const now = performance.now();
        if (now - lastSegTs < 40) return; // ~25fps; reuse last mask between
        lastSegTs = now;
        let res;
        try {
          res = segmenter.segmentForVideo(raw, now);
        } catch {
          return;
        }
        const m = res && res.confidenceMasks && res.confidenceMasks[0];
        if (m) {
          const u8 = m.getAsUint8Array(); // 0..255 person confidence
          // temporal smoothing kills the mask flicker that reads as "a filter"
          if (!smoothMask || smoothMask.length !== u8.length)
            smoothMask = new Uint8Array(u8);
          else
            for (let i = 0; i < u8.length; i++)
              smoothMask[i] = (smoothMask[i] + u8[i]) >> 1;
          filter.setMask(smoothMask, m.width, m.height);
        }
        if (res && res.close) res.close();
      }

      function drawFrame() {
        if (!drawing) return;
        const vw = raw.videoWidth,
          vh = raw.videoHeight;
        if (vw && vh) {
          const ang = effectiveRotation();
          // a 90/270° rotation swaps the output's width and height
          const [cw, ch] = ang % 180 === 0 ? [vw, vh] : [vh, vw];
          const ap = activeParams();
          updateMask(ap);
          filter.setSize(cw, ch);
          filter.render(raw, ang, ap, vw, vh);
        }
        requestAnimationFrame(drawFrame);
      }

      async function getCamera() {
        // Always ask the sensor for landscape (what iOS actually delivers); rotation
        // happens in the canvas, so the requested orientation here doesn't matter.
        const dims = resSel.value.split("x").map(Number);
        const long = Math.max(...dims),
          short = Math.min(...dims);
        const constraints = {
          video: {
            facingMode: { ideal: facing },
            width: { ideal: long },
            height: { ideal: short },
            frameRate: { ideal: 60 }, // smooth motion; phone gives 30 if it can't do 60
          },
          audio: micBox.checked,
        };
        if (rawStream) rawStream.getTracks().forEach((t) => t.stop());
        rawStream = await navigator.mediaDevices.getUserMedia(constraints);
        raw.srcObject = rawStream;
        await raw.play().catch(() => {});
        if (!drawing) {
          drawing = true;
          drawFrame();
        }
        if (!outStream) {
          outStream = canvas.captureStream(60);
          // Tell the encoder to preserve per-frame sharpness over smoothness, so
          // motion doesn't turn grainy.
          outStream.getVideoTracks().forEach((t) => (t.contentHint = "detail"));
        }
      }

      // WebRTC caps video around ~2.5 Mbps by default, which starves the encoder on
      // movement and looks grainy. On a LAN we can push far more. Scale to resolution.
      function targetBitrate() {
        const v = resSel.value;
        if (v.includes("3840")) return 40_000_000; // 4K
        if (v.includes("1920")) return 14_000_000; // 1080p
        return 7_000_000; // 720p
      }
      async function tuneSender() {
        const s = pc
          .getSenders()
          .find((x) => x.track && x.track.kind === "video");
        if (!s) return;
        try {
          const p = s.getParameters();
          if (!p.encodings || !p.encodings.length) p.encodings = [{}];
          p.encodings[0].maxBitrate = targetBitrate();
          p.encodings[0].maxFramerate = 60;
          p.degradationPreference = "maintain-resolution";
          await s.setParameters(p);
          // reflect the applied ceiling so it's inspectable (used by the e2e test)
          const applied = s.getParameters().encodings?.[0]?.maxBitrate;
          if (applied) document.body.dataset.maxBitrate = String(applied);
        } catch {
          /* older browsers: bitrate stays at default, still works */
        }
      }

      function sendTracks() {
        // rotated canvas video + the real mic audio
        return [...outStream.getVideoTracks(), ...rawStream.getAudioTracks()];
      }

      function buildPeer() {
        if (pc) pc.close();
        pc = new RTCPeerConnection(RTC_CONFIG);
        for (const t of sendTracks()) pc.addTrack(t, outStream);
        tuneSender();
        pc.onicecandidate = (e) => {
          if (e.candidate) sig.send({ type: "ice", candidate: e.candidate });
        };
        pc.onconnectionstatechange = () => {
          const s = pc.connectionState;
          if (s === "connected") setStatus("Live in OBS ●", "live");
          else if (s === "connecting") setStatus("Connecting…");
          else if (s === "failed" || s === "disconnected")
            setStatus("Reconnecting…", "warn");
        };
      }

      async function offer() {
        if (!outStream || !rawStream || !peerPresent) return;
        buildPeer();
        const desc = await pc.createOffer();
        await pc.setLocalDescription(desc);
        sig.send({ type: "offer", sdp: pc.localDescription });
        setStatus("Connecting…");
      }

      const sig = new Signal("sender");
      sig.addEventListener("superseded", () => {
        drawing = false;
        if (rawStream) rawStream.getTracks().forEach((t) => t.stop());
        if (pc) pc.close();
        setStatus("Another tab is using the camera — close this one.", "warn");
      });
      sig.addEventListener("msg", async ({ detail: msg }) => {
        if (msg.type === "peer") {
          peerPresent = msg.present;
          if (peerPresent) offer();
          else setStatus("Waiting for OBS…", "warn");
        } else if (msg.type === "answer") {
          await pc.setRemoteDescription(msg.sdp);
        } else if (msg.type === "ice" && pc) {
          try {
            await pc.addIceCandidate(msg.candidate);
          } catch {}
        }
      });

      // Rotation and orientation change the canvas only — the sent track is the same
      // captureStream object, so no renegotiation is needed and the feed never blips.
      rotateBtn.onclick = () => {
        rotationOffset = (rotationOffset + 90) % 360;
      };
      flipBtn.onclick = async () => {
        facing = facing === "environment" ? "user" : "environment";
        await getCamera();
        offer();
      };
      resSel.onchange = async () => {
        await getCamera();
        offer();
      };
      micBox.onchange = async () => {
        await getCamera();
        offer();
      };

      // ---------- filter panel wiring ----------
      const panel = document.getElementById("panel");
      const adjustBtn = document.getElementById("adjust");
      const abBtn = document.getElementById("ab");
      const mirrorBox = document.getElementById("mirror");
      const calibBox = document.getElementById("calib");
      const resetBtn = document.getElementById("reset");
      const sliders = [...panel.querySelectorAll("input[data-p]")];

      // reflect the current params object onto every control
      function syncUI() {
        for (const el of sliders) el.value = params[el.dataset.p];
        mirrorBox.checked = params.mirror;
        calibBox.checked = params.calib;
      }
      function applyPreset(name) {
        params = { ...PRESETS[name] };
        syncUI();
        saveParams();
        markActivePreset(name);
      }
      function markActivePreset(name) {
        for (const chip of presetsEl.children)
          chip.classList.toggle("on", chip.textContent === name);
      }

      const presetsEl = document.getElementById("presets");
      for (const name of Object.keys(PRESETS)) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.textContent = name;
        chip.onclick = () => applyPreset(name);
        presetsEl.appendChild(chip);
      }

      for (const el of sliders) {
        el.oninput = () => {
          params[el.dataset.p] = Number(el.value);
          saveParams();
          markActivePreset(""); // manual edit = no longer a named preset
        };
      }
      mirrorBox.onchange = () => {
        params.mirror = mirrorBox.checked;
        saveParams();
      };
      calibBox.onchange = () => {
        params.calib = calibBox.checked;
        saveParams();
      };
      resetBtn.onclick = () => applyPreset("True to Life");
      adjustBtn.onclick = () => {
        const open = panel.hasAttribute("hidden");
        panel.toggleAttribute("hidden", !open);
        adjustBtn.setAttribute("aria-pressed", String(open));
      };
      // A/B: hold to peek the raw frame, release to return to your look
      const abDown = () => {
        abHold = true;
      };
      const abUp = () => {
        abHold = false;
      };
      abBtn.addEventListener("pointerdown", abDown);
      abBtn.addEventListener("pointerup", abUp);
      abBtn.addEventListener("pointerleave", abUp);
      abBtn.addEventListener("pointercancel", abUp);
      syncUI();

      (async () => {
        try {
          await getCamera();
          setStatus("Camera ready — waiting for OBS…", "warn");
          if (peerPresent) offer();
        } catch (err) {
          setStatus("Camera blocked: " + err.message, "warn");
        }
      })();
    </script>
  </body>
</html>
